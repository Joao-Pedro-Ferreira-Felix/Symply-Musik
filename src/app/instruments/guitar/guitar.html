<div>
  <button id="goback-btn" routerLink="">Go Back</button>
</div>

<div id="center-horizontal">
  <span class="guitar-background"></span>
  <span class="guitar-background-soundhole"></span>
  <div class="string-column">
    <div class="guitar-background-handle">
      <button (click)="playNote(0);" [className]="noteCssClass[0]"></button>
      <button (click)="playNote(1);" [className]="noteCssClass[1]"></button>
      <button (click)="playNote(2);" [className]="noteCssClass[2]"></button>
      <button (click)="playNote(3);" [className]="noteCssClass[3]"></button>
      <button (click)="playNote(4);" [className]="noteCssClass[4]"></button>
      <button (click)="playNote(5);" [className]="noteCssClass[5]"></button>
      <button (click)="playNote(6);" [className]="noteCssClass[6]"></button>
      <button (click)="playNote(7);" [className]="noteCssClass[7]"></button>
      <button (click)="playNote(8);" [className]="noteCssClass[8]"></button>
      <button (click)="playNote(9);" [className]="noteCssClass[9]"></button>
    </div>
  </div>
</div>
